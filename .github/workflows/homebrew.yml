name: Homebrew

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  homebrew:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          VERSION=${TAG#v}
          
          if ! git clone https://${{ secrets.HOMEBREW_TOKEN }}@github.com/joaaomanooel/homebrew-syswatch.git /tmp/homebrew-syswatch 2>/dev/null; then
            mkdir -p /tmp/homebrew-syswatch
            cd /tmp/homebrew-syswatch
            git init
            git remote add origin https://${{ secrets.HOMEBREW_TOKEN }}@github.com/joaaomanooel/homebrew-syswatch.git
          fi

          cd /tmp/homebrew-syswatch
          mkdir -p Formula

          printf 'class Syswatch < Formula\n  desc "CLI system monitoring tool"\n  homepage "https://github.com/joaaomanooel/syswatch"\n  version "%s"\n  license "MIT"\n\n  on_macos do\n    if Hardware::CPU.arm?\n      url "https://github.com/joaaomanooel/syswatch/releases/download/%s/syswatch_%s_darwin_arm64.zip"\n    else\n      url "https://github.com/joaaomanooel/syswatch/releases/download/%s/syswatch_%s_darwin_amd64.zip"\n    end\n  end\n\n  on_linux do\n    if Hardware::CPU.arm64?\n      url "https://github.com/joaaomanooel/syswatch/releases/download/%s/syswatch_%s_linux_arm64.zip"\n    else\n      url "https://github.com/joaaomanooel/syswatch/releases/download/%s/syswatch_%s_linux_amd64.zip"\n    end\n  end\n\n  def install\n    bin.install "syswatch"\n  end\n\n  test do\n    system "#{bin}/syswatch", "--version"\n  end\nend\n' "$VERSION" "$TAG" "$VERSION" "$TAG" "$VERSION" "$TAG" "$VERSION" > Formula/syswatch.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Update syswatch to $TAG" || echo "No changes to commit"
          git push https://${{ secrets.HOMEBREW_TOKEN }}@github.com/joaaomanooel/homebrew-syswatch.git main || git push -u https://${{ secrets.HOMEBREW_TOKEN }}@github.com/joaaomanooel/homebrew-syswatch.git main
